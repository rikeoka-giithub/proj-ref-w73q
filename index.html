<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ロウソク検証 - 理系のオカルト研</title>
<style>
  /* ===== Google Fonts ===== */
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@700;900&display=swap');

  /* ===== Reset & Base ===== */
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #0a0a0a;
    font-family: 'Noto Serif JP', serif;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  /* ===== Full-screen container ===== */
  .container {
    position: relative;
    width: 100%; height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    background: radial-gradient(ellipse at 50% 60%, #1a0a00 0%, #0a0505 40%, #000000 100%);
  }

  /* ===== Fog / Mist overlay ===== */
  .fog {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 80%, rgba(60,30,30,0.15) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 20%, rgba(40,20,40,0.10) 0%, transparent 50%);
    animation: fogDrift 12s ease-in-out infinite alternate;
    pointer-events: none;
    z-index: 1;
  }
  @keyframes fogDrift {
    0%   { opacity: 0.3; transform: translateX(-10px); }
    100% { opacity: 0.7; transform: translateX(10px); }
  }

  /* ===== Floating dust particles ===== */
  .particles {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    overflow: hidden;
  }
  .particle {
    position: absolute;
    width: 2px; height: 2px;
    background: rgba(255, 180, 80, 0.4);
    border-radius: 50%;
    animation: floatUp linear infinite;
  }
  @keyframes floatUp {
    0%   { transform: translateY(100vh) scale(1); opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 1; }
    100% { transform: translateY(-10vh) scale(0.3); opacity: 0; }
  }

  /* ===== Title ===== */
  .title-area {
    position: relative;
    z-index: 10;
    text-align: center;
    padding-top: max(3vh, 20px);
  }
  .title-main {
    font-size: clamp(28px, 7vw, 52px);
    font-weight: 900;
    color: #e8c47a;
    text-shadow:
      0 0 20px rgba(255, 150, 50, 0.6),
      0 0 60px rgba(255, 100, 20, 0.3),
      0 2px 4px rgba(0,0,0,0.8);
    letter-spacing: 0.15em;
    animation: titleFlicker 4s ease-in-out infinite;
  }
  @keyframes titleFlicker {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0.92; }
    52%      { opacity: 0.85; }
    54%      { opacity: 0.95; }
  }
  .title-sub {
    font-size: clamp(11px, 2.8vw, 16px);
    color: rgba(200, 160, 100, 0.5);
    letter-spacing: 0.3em;
    margin-top: 6px;
    font-weight: 700;
  }

  /* ===== Candle Canvas Area ===== */
  .candle-area {
    position: relative;
    z-index: 10;
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
  }
  #candleCanvas {
    display: block;
    max-width: 100%;
    max-height: 100%;
  }

  /* ===== Ambient glow under candle ===== */
  .candle-glow {
    position: absolute;
    bottom: 15%;
    left: 50%;
    transform: translateX(-50%);
    width: 300px;
    height: 120px;
    background: radial-gradient(ellipse, rgba(255,140,40,0.12) 0%, transparent 70%);
    border-radius: 50%;
    animation: glowPulse 3s ease-in-out infinite;
    pointer-events: none;
    z-index: 5;
  }
  @keyframes glowPulse {
    0%, 100% { transform: translateX(-50%) scale(1); opacity: 0.7; }
    50%      { transform: translateX(-50%) scale(1.15); opacity: 1; }
  }

  /* ===== Button Area ===== */
  .button-area {
    position: relative;
    z-index: 10;
    padding-bottom: max(4vh, 24px);
    text-align: center;
  }
  .btn-seance {
    position: relative;
    display: inline-block;
    padding: 16px 40px;
    font-family: 'Noto Serif JP', serif;
    font-size: clamp(16px, 4vw, 22px);
    font-weight: 700;
    color: #f0d8a0;
    background: linear-gradient(180deg, rgba(80,30,10,0.9) 0%, rgba(40,10,5,0.95) 100%);
    border: 1px solid rgba(200,130,50,0.4);
    border-radius: 4px;
    cursor: pointer;
    letter-spacing: 0.2em;
    text-shadow: 0 0 12px rgba(255,150,50,0.5);
    box-shadow:
      0 0 20px rgba(255,100,20,0.15),
      inset 0 1px 0 rgba(255,200,100,0.1);
    transition: all 0.3s ease;
    overflow: hidden;
  }
  .btn-seance::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(255,150,50,0.08) 0%, transparent 50%);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .btn-seance:hover::before,
  .btn-seance:active::before {
    opacity: 1;
  }
  .btn-seance:active {
    transform: scale(0.97);
    box-shadow:
      0 0 30px rgba(255,100,20,0.3),
      inset 0 1px 0 rgba(255,200,100,0.15);
  }
  /* Pulsing border glow */
  .btn-seance::after {
    content: '';
    position: absolute;
    inset: -2px;
    border-radius: 6px;
    background: linear-gradient(45deg, rgba(255,120,30,0.3), transparent, rgba(255,120,30,0.3));
    z-index: -1;
    animation: borderGlow 3s ease-in-out infinite;
  }
  @keyframes borderGlow {
    0%, 100% { opacity: 0.3; }
    50%      { opacity: 0.8; }
  }

  /* ===== Audio start overlay (iOS/Android autoplay policy) ===== */
  .audio-prompt {
    position: fixed;
    inset: 0;
    z-index: 1000;
    background: rgba(0,0,0,0.92);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: opacity 0.8s ease;
  }
  .audio-prompt.hidden {
    opacity: 0;
    pointer-events: none;
  }
  .audio-prompt-icon {
    font-size: 48px;
    margin-bottom: 20px;
    animation: promptPulse 2s ease-in-out infinite;
  }
  @keyframes promptPulse {
    0%, 100% { transform: scale(1); opacity: 0.7; }
    50%      { transform: scale(1.1); opacity: 1; }
  }
  .audio-prompt-text {
    font-family: 'Noto Serif JP', serif;
    font-size: clamp(14px, 4vw, 20px);
    color: rgba(200,160,100,0.8);
    letter-spacing: 0.15em;
  }
  .audio-prompt-sub {
    font-family: 'Noto Serif JP', serif;
    font-size: clamp(10px, 2.5vw, 13px);
    color: rgba(200,160,100,0.35);
    margin-top: 10px;
    letter-spacing: 0.1em;
  }
</style>
</head>
<body>

<!-- Audio start overlay (needed for mobile autoplay policy) -->
<div class="audio-prompt" id="audioPrompt">
  <div class="audio-prompt-icon">🕯️</div>
  <div class="audio-prompt-text">画面をタップして開始</div>
  <div class="audio-prompt-sub">音声が流れます</div>
</div>

<div class="container">
  <!-- Fog overlay -->
  <div class="fog"></div>

  <!-- Floating particles -->
  <div class="particles" id="particles"></div>

  <!-- Title -->
  <div class="title-area">
    <h1 class="title-main">ロウソク検証</h1>
    <div class="title-sub">理系のオカルト研</div>
  </div>

  <!-- Candle -->
  <div class="candle-area">
    <div class="candle-glow"></div>
    <canvas id="candleCanvas"></canvas>
  </div>

  <!-- Button -->
  <div class="button-area">
    <button class="btn-seance" id="btnSeance">交霊術を開始する</button>
  </div>
</div>

<script>
// ============================================================
//  PARTICLES
// ============================================================
(function initParticles() {
  const container = document.getElementById('particles');
  const count = 18;
  for (let i = 0; i < count; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + '%';
    p.style.animationDuration = (8 + Math.random() * 12) + 's';
    p.style.animationDelay = (Math.random() * 10) + 's';
    p.style.width = p.style.height = (1 + Math.random() * 2) + 'px';
    container.appendChild(p);
  }
})();

// ============================================================
//  CANDLE RENDERING (Canvas 2D)
// ============================================================
const canvas = document.getElementById('candleCanvas');
const ctx = canvas.getContext('2d');

let W, H, candleX, candleBaseY, candleW, candleH, wickTop;
let flameTime = 0;
let audioStarted = false;

function resize() {
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.parentElement.getBoundingClientRect();
  W = rect.width;
  H = rect.height;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  // candle dimensions
  candleW = Math.min(W * 0.12, 50);
  candleH = Math.min(H * 0.38, 200);
  candleX = W / 2;
  candleBaseY = H * 0.75;
  wickTop = candleBaseY - candleH;
}
window.addEventListener('resize', resize);
resize();

// Noise helper
function noise(t) {
  return Math.sin(t * 2.1) * 0.3 + Math.sin(t * 5.3) * 0.2 + Math.sin(t * 11.7) * 0.15 + Math.sin(t * 23.1) * 0.1;
}

function drawCandle() {
  // --- Candle body ---
  const bodyTop = wickTop + 8;
  const grad = ctx.createLinearGradient(candleX - candleW/2, bodyTop, candleX + candleW/2, bodyTop);
  grad.addColorStop(0, '#d4c4a0');
  grad.addColorStop(0.3, '#f5ead0');
  grad.addColorStop(0.6, '#f0e0c0');
  grad.addColorStop(1, '#b0a080');

  ctx.beginPath();
  ctx.moveTo(candleX - candleW/2, bodyTop);
  ctx.lineTo(candleX - candleW/2, candleBaseY);
  // bottom rounded
  ctx.quadraticCurveTo(candleX - candleW/2, candleBaseY + 4, candleX, candleBaseY + 4);
  ctx.quadraticCurveTo(candleX + candleW/2, candleBaseY + 4, candleX + candleW/2, candleBaseY);
  ctx.lineTo(candleX + candleW/2, bodyTop);
  // melted wax top
  const meltA = Math.sin(flameTime * 0.7) * 2;
  const meltB = Math.cos(flameTime * 0.5) * 1.5;
  ctx.quadraticCurveTo(candleX + candleW * 0.25, bodyTop - 3 + meltA, candleX, bodyTop - 1 + meltB);
  ctx.quadraticCurveTo(candleX - candleW * 0.25, bodyTop - 3 - meltA, candleX - candleW/2, bodyTop);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();

  // Wax drip
  const dripY = bodyTop + candleH * 0.2;
  ctx.beginPath();
  ctx.ellipse(candleX + candleW/2 + 1, dripY, 3, 8 + Math.sin(flameTime) * 1, 0.1, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(230,215,180,0.7)';
  ctx.fill();

  // --- Wick ---
  ctx.beginPath();
  ctx.moveTo(candleX, bodyTop);
  ctx.quadraticCurveTo(candleX + noise(flameTime * 3) * 2, wickTop + 4, candleX, wickTop);
  ctx.strokeStyle = '#2a2015';
  ctx.lineWidth = 1.8;
  ctx.stroke();

  // Glowing wick tip
  ctx.beginPath();
  ctx.arc(candleX, wickTop, 2, 0, Math.PI * 2);
  ctx.fillStyle = '#ff8020';
  ctx.fill();
}

function drawFlame(time) {
  const baseX = candleX;
  const baseY = wickTop;
  const flicker = noise(time * 4);
  const flicker2 = noise(time * 6 + 100);
  const swayX = flicker * 5;
  const swayX2 = flicker2 * 3;

  const flameH = 35 + noise(time * 3) * 8;
  const flameW = 12 + noise(time * 5 + 50) * 3;

  // --- Outer glow ---
  const glowGrad = ctx.createRadialGradient(
    baseX + swayX * 0.5, baseY - flameH * 0.5, 0,
    baseX, baseY - flameH * 0.3, flameH * 1.5
  );
  glowGrad.addColorStop(0, 'rgba(255,150,30,0.12)');
  glowGrad.addColorStop(1, 'rgba(255,100,20,0)');
  ctx.fillStyle = glowGrad;
  ctx.fillRect(baseX - 80, baseY - flameH * 2, 160, flameH * 3);

  // --- Outer flame (orange-red) ---
  ctx.beginPath();
  ctx.moveTo(baseX, baseY + 2);
  ctx.bezierCurveTo(
    baseX - flameW * 1.1, baseY - flameH * 0.15,
    baseX - flameW * 0.6 + swayX, baseY - flameH * 0.7,
    baseX + swayX * 1.2, baseY - flameH
  );
  ctx.bezierCurveTo(
    baseX + flameW * 0.6 + swayX2, baseY - flameH * 0.7,
    baseX + flameW * 1.1, baseY - flameH * 0.15,
    baseX, baseY + 2
  );
  const outerGrad = ctx.createLinearGradient(baseX, baseY, baseX + swayX, baseY - flameH);
  outerGrad.addColorStop(0, 'rgba(255,80,10,0.9)');
  outerGrad.addColorStop(0.4, 'rgba(255,160,30,0.85)');
  outerGrad.addColorStop(0.7, 'rgba(255,200,60,0.7)');
  outerGrad.addColorStop(1, 'rgba(255,220,100,0.1)');
  ctx.fillStyle = outerGrad;
  ctx.fill();

  // --- Inner flame (yellow-white) ---
  const innerH = flameH * 0.55;
  const innerW = flameW * 0.45;
  ctx.beginPath();
  ctx.moveTo(baseX, baseY + 1);
  ctx.bezierCurveTo(
    baseX - innerW, baseY - innerH * 0.2,
    baseX - innerW * 0.5 + swayX * 0.6, baseY - innerH * 0.75,
    baseX + swayX * 0.8, baseY - innerH
  );
  ctx.bezierCurveTo(
    baseX + innerW * 0.5 + swayX2 * 0.6, baseY - innerH * 0.75,
    baseX + innerW, baseY - innerH * 0.2,
    baseX, baseY + 1
  );
  const innerGrad = ctx.createLinearGradient(baseX, baseY, baseX, baseY - innerH);
  innerGrad.addColorStop(0, 'rgba(100,130,255,0.8)');
  innerGrad.addColorStop(0.25, 'rgba(255,255,200,0.9)');
  innerGrad.addColorStop(0.6, 'rgba(255,255,230,0.7)');
  innerGrad.addColorStop(1, 'rgba(255,255,255,0.0)');
  ctx.fillStyle = innerGrad;
  ctx.fill();

  // --- Smoke wisps ---
  const smokeAlpha = 0.04 + noise(time * 2) * 0.02;
  for (let i = 0; i < 3; i++) {
    const smokeY = baseY - flameH - 10 - i * 15;
    const smokeX = baseX + swayX * (1.5 + i * 0.5) + Math.sin(time * 3 + i) * 5;
    ctx.beginPath();
    ctx.arc(smokeX, smokeY, 4 + i * 3, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(180,170,160,${smokeAlpha - i * 0.01})`;
    ctx.fill();
  }
}

// Main render loop
function render(timestamp) {
  flameTime = timestamp / 1000;
  ctx.clearRect(0, 0, W, H);
  drawCandle();
  drawFlame(flameTime);
  requestAnimationFrame(render);
}
requestAnimationFrame(render);

// ============================================================
//  FIRE CRACKLING SOUND (Web Audio API)
// ============================================================
let audioCtx = null;

function startAudio() {
  if (audioStarted) return;
  audioStarted = true;

  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  // --- Layer 1: Filtered noise base (continuous soft hiss) ---
  const bufferSize = audioCtx.sampleRate * 2;
  const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = noiseBuffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) {
    data[i] = (Math.random() * 2 - 1) * 0.15;
  }
  const noiseNode = audioCtx.createBufferSource();
  noiseNode.buffer = noiseBuffer;
  noiseNode.loop = true;

  const noiseFilter = audioCtx.createBiquadFilter();
  noiseFilter.type = 'bandpass';
  noiseFilter.frequency.value = 800;
  noiseFilter.Q.value = 0.5;

  const noiseGain = audioCtx.createGain();
  noiseGain.gain.value = 0.06;

  noiseNode.connect(noiseFilter);
  noiseFilter.connect(noiseGain);
  noiseGain.connect(audioCtx.destination);
  noiseNode.start();

  // --- Layer 2: Random crackles ---
  function scheduleCrackle() {
    const now = audioCtx.currentTime;
    const duration = 0.01 + Math.random() * 0.04;

    // Create a short noise burst
    const crackleBuf = audioCtx.createBuffer(1, Math.ceil(audioCtx.sampleRate * duration), audioCtx.sampleRate);
    const cd = crackleBuf.getChannelData(0);
    for (let i = 0; i < cd.length; i++) {
      const env = 1 - (i / cd.length); // decay envelope
      cd[i] = (Math.random() * 2 - 1) * env;
    }

    const crackleSource = audioCtx.createBufferSource();
    crackleSource.buffer = crackleBuf;

    const crackleFilter = audioCtx.createBiquadFilter();
    crackleFilter.type = 'highpass';
    crackleFilter.frequency.value = 1500 + Math.random() * 3000;

    const crackleGain = audioCtx.createGain();
    crackleGain.gain.value = 0.08 + Math.random() * 0.14;

    crackleSource.connect(crackleFilter);
    crackleFilter.connect(crackleGain);
    crackleGain.connect(audioCtx.destination);
    crackleSource.start(now);

    // Schedule next crackle
    const nextDelay = 60 + Math.random() * 400; // ms
    setTimeout(scheduleCrackle, nextDelay);
  }
  scheduleCrackle();

  // --- Layer 3: Low rumble ---
  const rumbleOsc = audioCtx.createOscillator();
  rumbleOsc.type = 'sine';
  rumbleOsc.frequency.value = 45;
  const rumbleGain = audioCtx.createGain();
  rumbleGain.gain.value = 0.015;
  rumbleOsc.connect(rumbleGain);
  rumbleGain.connect(audioCtx.destination);
  rumbleOsc.start();

  // Modulate rumble
  const lfo = audioCtx.createOscillator();
  lfo.type = 'sine';
  lfo.frequency.value = 0.3;
  const lfoGain = audioCtx.createGain();
  lfoGain.gain.value = 0.008;
  lfo.connect(lfoGain);
  lfoGain.connect(rumbleGain.gain);
  lfo.start();
}

// ============================================================
//  AUDIO PROMPT (touch/click to start – mobile autoplay policy)
// ============================================================
const audioPrompt = document.getElementById('audioPrompt');
audioPrompt.addEventListener('click', () => {
  startAudio();
  audioPrompt.classList.add('hidden');
  setTimeout(() => { audioPrompt.style.display = 'none'; }, 800);
}, { once: true });

// ============================================================
//  SEANCE BUTTON
// ============================================================
const btnSeance = document.getElementById('btnSeance');
btnSeance.addEventListener('click', () => {
  // Placeholder – 後で交霊術の処理を追加予定
  console.log('交霊術を開始する – 処理は後で実装');
});
</script>
</body>
</html>
